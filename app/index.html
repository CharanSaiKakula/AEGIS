<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RALPHLY</title>
    <!-- Google Fonts for futuristic look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Mapbox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
  </head>
  <body>
    <div id="app-container">
      <!-- Top Navigation -->
      <nav class="top-nav" style="justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,240,255,0.1); background: rgba(10, 15, 20, 0.85); backdrop-filter: blur(10px); position: relative; z-index: 9999;">
        <!-- Top Left: Logo -->
        <div class="brand">
          <span style="font-family: 'Outfit', sans-serif; letter-spacing: 3px; font-size: 1.5rem; color: #ffffff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.4); font-weight: bold; text-transform: uppercase;">RALPHLY</span>
        </div>
        
        <!-- Empty Center Spacer -->
        <div style="flex: 1;"></div>

        <!-- Top Right: User Controls -->
        <div class="nav-controls flex-row" id="user-profile-controls" style="display: none; align-items: center;">
          <div class="profile-dropdown-container">
            <img src="/assets/nav-icon.png" alt="Profile Icon" style="width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: none; display: block;" />
            <div class="profile-dropdown-menu">
              <div class="profile-dropdown-item user-name" id="logged-in-user">User: Charan</div>
              <button class="profile-dropdown-item logout-btn" id="btn-logout">Logout</button>
            </div>
          </div>
        </div>
      </nav>

      <!-- Main View Container -->
      <main id="view-container">
        <!-- Login View Mount Point -->
        <div id="login-view"></div>

        <!-- User View Mount Point -->
        <div id="user-view" class="hidden"></div>
        
        <!-- Admin View Mount Point -->
        <div id="admin-view" class="hidden"></div>
      </main>
    </div>

    <!-- Application Script Entry Point -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
