<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RALPHLY</title>
    <!-- Google Fonts for futuristic look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Mapbox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
  </head>
  <body>
    <div id="app-container">
      <!-- Top Navigation -->
      <nav class="top-nav">
        <div class="brand">
          <span class="text-main" style="font-family: 'Outfit', sans-serif; letter-spacing: 2px;">RALPHLY</span>
        </div>
        <div class="nav-controls flex-row" id="user-profile-controls" style="display: none;">
          <span style="font-size: 0.8rem; color: var(--text-muted);" id="logged-in-user"></span>
          <button id="btn-logout" class="btn btn-danger">Logout</button>
        </div>
      </nav>

      <!-- Main View Container -->
      <main id="view-container">
        <!-- Login View Mount Point -->
        <div id="login-view"></div>

        <!-- User View Mount Point -->
        <div id="user-view" class="hidden"></div>
        
        <!-- Admin View Mount Point -->
        <div id="admin-view" class="hidden"></div>
      </main>
    </div>

    <!-- Application Script Entry Point -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
